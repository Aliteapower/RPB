# RPB protected public acceptance Nginx site.
# Install as /etc/nginx/sites-available/rpb-public-acceptance.conf and symlink into sites-enabled.

server {
    listen 80;
    server_name acceptance.example.com *.acceptance.example.com;

    root /opt/rpb/frontend;
    index index.html;

    client_max_body_size 90m;

    # Acceptance front door protection. Keep both controls enabled.
    satisfy all;
    auth_basic "RPB protected public acceptance";
    auth_basic_user_file /etc/nginx/.rpb-public-acceptance.htpasswd;
    allow 203.0.113.10;
    # allow 198.51.100.0/24;
    deny all;

    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
